<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>線上投稿 | HEFC 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="site-main">
    <h1 class="page-title">線上投稿系統</h1>

    <div class="grid-1-2">
      <aside>
        <article class="card submit-side-card">
          <h3>投稿文件下載</h3>
          <p class="small">請先下載摘要模板，依格式撰寫後再進行投稿。</p>
          <div class="submit-downloads">
            <a href="#" class="btn btn--ghost btn-block u-mb-10">摘要模板（Word）</a>
            <a href="#" class="btn btn--ghost btn-block">投稿說明（PDF）</a>
          </div>
          <hr>
          <h4 class="u-mt-15">投稿須知</h4>
          <ul class="small u-lh-16">
            <li>上傳檔案格式請使用 <strong>PDF</strong>。</li>
            <li>檔案大小請勿超過 <strong>10 MB</strong>。</li>
            <li>投稿截止日期為 <strong>2026/08/15</strong>。</li>
            <li>送出前請再次確認作者資訊與摘要內容。</li>
          </ul>
        </article>

        <article class="card">
          <h4>常見問題</h4>
          <p class="small"><strong>Q：可以修改已送出的稿件嗎？</strong><br>A：可使用系統回傳的查詢代碼聯繫主辦單位協助處理。</p>
        </article>
      </aside>

      <section>
        <article class="card">
          <h2>論文投稿表單</h2>
          <form id="form-submission" class="form-stack" enctype="multipart/form-data">
            <div class="form-row">
              <label for="title">論文題目 <span class="hint">（必填）</span></label>
              <input type="text" id="title" name="title" required placeholder="請輸入論文題目" autocomplete="off">
            </div>

            <div class="grid-2-col-tight">
              <div class="form-row">
                <label for="authors">作者姓名 <span class="hint">（第一作者優先）</span></label>
                <input type="text" id="authors" name="authors" required placeholder="例如：王大明、李小華">
              </div>
              <div class="form-row">
                <label for="organization">服務單位／學校</label>
                <input type="text" id="organization" name="organization" placeholder="例如：國立臺灣科技大學">
              </div>
            </div>

            <div class="form-row">
              <label for="email">聯絡 Email</label>
              <input type="email" id="email" name="email" required placeholder="用於接收投稿確認通知" autocomplete="email">
            </div>

            <div class="form-row">
              <label for="presentation_type">發表形式</label>
              <select id="presentation_type" name="presentation_type" required>
                <option value="">請選擇發表形式</option>
                <option value="oral">口頭發表（Oral）</option>
                <option value="oral_student">學生論文競賽（Oral Competition）</option>
                <option value="poster">海報發表（Poster）</option>
              </select>
            </div>

            <div class="form-row">
              <label for="track">投稿主題</label>
              <select id="track" name="track" required>
                <option value="">請選擇主題分類</option>
                <option value="hydrogen">1. 氫能製備、儲運與安全</option>
                <option value="fuelcell">2. 燃料電池材料與系統</option>
                <option value="policy">3. 政策、產業與示範應用</option>
                <option value="other">4. 其他相關主題</option>
              </select>
            </div>

            <div class="form-row">
              <label for="abstract_text">摘要內容 <span class="hint">（建議 300-500 字）</span></label>
              <textarea id="abstract_text" name="abstract_text" required minlength="50" rows="6" placeholder="請在此貼上摘要內容"></textarea>
            </div>

            <div class="form-row file-upload-box">
              <label for="file"><strong>上傳摘要 PDF</strong> <span class="hint">（若僅送摘要，也可先不上傳檔案）</span></label>
              <input type="file" id="file" name="file" accept=".pdf,application/pdf">
            </div>

            <div id="form-submission-msg" class="form-msg" role="status"></div>
            <div class="form-actions form-actions-mt">
              <button type="submit" class="btn btn--primary btn-full-lg">送出投稿</button>
            </div>
          </form>
        </article>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p><strong>2026 台灣氫能與燃料電池研討會（2026 HEFC）</strong></p>
      <p>主辦：國立臺灣科技大學 材料科學與工程系 氫能與燃料電池實驗室</p>
    </div>
  </footer>
  <script src="forms.js" defer></script>
</body>
</html>
