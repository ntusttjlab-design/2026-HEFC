<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>管理後台 - 2026 HEFC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="site-main">
    <h1 class="page-title">報名與投稿管理後台</h1>
    <p class="lead">請輸入環境變數 <code>HEFC_ADMIN_TOKEN</code> 對應的管理金鑰，即可載入報名與投稿資料。</p>

    <article class="card">
      <h2>登入</h2>
      <div class="form-row">
        <label for="token">管理金鑰</label>
        <input type="password" id="token" autocomplete="current-password" placeholder="HEFC_ADMIN_TOKEN">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn--primary" id="btn-load">載入資料</button>
      </div>
      <p id="admin-msg" class="form-msg admin-msg-spacing"></p>
    </article>

    <article class="card">
      <h2>統計</h2>
      <p id="summary">尚未載入資料</p>
    </article>

    <article class="card">
      <h2>報名列表</h2>
      <div class="admin-table-wrap">
        <table class="admin-table" id="tbl-reg">
          <thead>
            <tr>
              <th>#</th>
              <th>時間</th>
              <th>姓名</th>
              <th>Email</th>
              <th>身份</th>
              <th>單位</th>
              <th>備註</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </article>

    <article class="card">
      <h2>投稿列表</h2>
      <div class="admin-table-wrap">
        <table class="admin-table" id="tbl-sub">
          <thead>
            <tr>
              <th>#</th>
              <th>時間</th>
              <th>題目</th>
              <th>作者</th>
              <th>Email</th>
              <th>發表形式</th>
              <th>摘要</th>
              <th>檔名</th>
              <th>查詢碼</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p><a href="index.html">返回首頁</a></p>
    </div>
  </footer>
  <script>
(function () {
  var btn = document.getElementById("btn-load");
  var tok = document.getElementById("token");
  var msg = document.getElementById("admin-msg");
  var summary = document.getElementById("summary");

  function showErr(text) {
    msg.textContent = text;
    msg.className = "form-msg is-visible form-msg--err";
  }

  function showOk(text) {
    msg.textContent = text;
    msg.className = "form-msg is-visible form-msg--ok";
  }

  btn.addEventListener("click", function () {
    var token = tok.value.trim();
    if (!token) {
      showErr("請輸入管理金鑰。");
      return;
    }

    msg.className = "form-msg";
    msg.textContent = "";

    fetch("/api/admin/summary", {
      headers: { "X-Admin-Token": token }
    })
      .then(function (response) {
        if (!response.ok) throw new Error("管理金鑰錯誤或沒有權限。");
        return response.json();
      })
      .then(function (stats) {
        summary.textContent =
          "報名 " + stats.registrations + " 筆，投稿 " + stats.submissions + " 筆";

        return Promise.all([
          fetch("/api/admin/registrations", {
            headers: { "X-Admin-Token": token }
          }).then(function (response) {
            return response.json();
          }),
          fetch("/api/admin/submissions", {
            headers: { "X-Admin-Token": token }
          }).then(function (response) {
            return response.json();
          })
        ]);
      })
      .then(function (pair) {
        var regs = pair[0].items || [];
        var subs = pair[1].items || [];
        var tbR = document.querySelector("#tbl-reg tbody");
        var tbS = document.querySelector("#tbl-sub tbody");
        tbR.innerHTML = "";
        tbS.innerHTML = "";

        regs.forEach(function (row) {
          var tr = document.createElement("tr");
          tr.innerHTML =
            "<td>" + row.id + "</td>" +
            "<td>" + esc(row.created_at) + "</td>" +
            "<td>" + esc(row.name_zh) + "</td>" +
            "<td>" + esc(row.email) + "</td>" +
            "<td>" + esc(row.participant_type) + "</td>" +
            "<td>" + esc(row.organization || "") + "</td>" +
            "<td><pre>" +
            esc([row.dietary, row.invoice_need, row.remarks].filter(Boolean).join("\n")) +
            "</pre></td>";
          tbR.appendChild(tr);
        });

        subs.forEach(function (row) {
          var tr = document.createElement("tr");
          tr.innerHTML =
            "<td>" + row.id + "</td>" +
            "<td>" + esc(row.created_at) + "</td>" +
            "<td>" + esc(row.title) + "</td>" +
            "<td>" + esc(row.authors) + "</td>" +
            "<td>" + esc(row.email) + "</td>" +
            "<td>" + esc(row.presentation_type) + "</td>" +
            "<td><pre>" + esc(row.abstract_text) + "</pre></td>" +
            "<td>" + esc(row.file_name || "") + "</td>" +
            "<td><code>" + esc(row.receipt_token) + "</code></td>";
          tbS.appendChild(tr);
        });

        showOk("資料已載入。");
      })
      .catch(function (error) {
        showErr(error.message || String(error));
      });
  });

  function esc(value) {
    if (value == null) return "";
    var div = document.createElement("div");
    div.textContent = value;
    return div.innerHTML;
  }
})();
  </script>
</body>
</html>
